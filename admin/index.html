<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão — Proimagem.pt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

  <!-- Ecrã de login -->
  <div class="login" id="login-screen">
    <div class="login__card">
      <p class="login__brand">Proimagem.pt</p>
      <h1 class="login__title">Gestão do site</h1>
      <p class="login__text">Entra com o teu utilizador e palavra-passe para gerir fotos, vídeos e textos do site.</p>
      <form class="login__form" id="login-form">
        <div class="field">
          <label class="field__label" for="login-user">Utilizador</label>
          <input class="field__input" id="login-user" type="text" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label class="field__label" for="login-pass">Palavra-passe</label>
          <input class="field__input" id="login-pass" type="password" name="password" autocomplete="current-password" required>
        </div>
        <p class="login__error" id="login-error"></p>
        <button class="btn btn--primary login__submit" type="submit">Entrar</button>
      </form>
      <a class="login__back" href="/">← Voltar ao site</a>
    </div>
  </div>

  <!-- Painel principal -->
  <div class="panel is-hidden" id="panel">
    <header class="panel__header">
      <div class="panel__header-left">
        <span class="panel__brand">Proimagem.pt</span>
        <span class="panel__badge">Gestão</span>
      </div>
      <div class="panel__header-right">
        <a class="panel__link" href="/" target="_blank" rel="noopener">Ver site ↗</a>
        <button class="btn btn--ghost" id="btn-logout" type="button">Sair</button>
      </div>
    </header>

    <div class="panel__body">
      <aside class="sidebar">
        <p class="sidebar__label">Páginas</p>
        <nav class="sidebar__nav" id="sidebar-nav"></nav>
      </aside>

      <main class="workspace">
        <div class="workspace__top">
          <div>
            <h1 class="workspace__title" id="page-title">—</h1>
            <p class="workspace__hint" id="page-hint"></p>
          </div>
          <div class="workspace__actions">
            <span class="status" id="save-status"></span>
            <button class="btn btn--primary" id="btn-save" type="button">Guardar alterações</button>
          </div>
        </div>
        <div class="workspace__content" id="workspace-content"></div>
      </main>
    </div>
  </div>

  <div class="toast is-hidden" id="toast"></div>

  <script src="/admin/admin.js"></script>
</body>
</html>
