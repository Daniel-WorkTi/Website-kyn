# ─────────────────────────────────────────────────────────────
# Proimagem.pt — configuração do painel de conteúdo (Decap CMS)
#
# ANTES DE FUNCIONAR: substituir OWNER/REPO e o domínio abaixo.
# Ver o guia em GUIA-CMS.md (secção "Ligar o painel").
# ─────────────────────────────────────────────────────────────

backend:
  name: github
  repo: OWNER/REPO            # ex.: kymwiller/proimagem-site
  branch: main
  base_url: https://SEU-SITE.vercel.app   # domínio do site no Vercel
  auth_endpoint: api/auth

# Onde as fotos/vídeos enviados pelo painel são guardados
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Idioma do painel
locale: "pt"

# Guarda alterações diretamente (sem fluxo de revisão)
publish_mode: simple

collections:
  # ── Definições gerais do site ──
  - name: "site"
    label: "Site (geral)"
    files:
      - name: "site"
        label: "Definições gerais"
        file: "content/site.json"
        fields:
          - { name: "brand", label: "Nome da marca", widget: "string" }
          - { name: "email", label: "Email de contacto", widget: "string", required: false }
          - name: "socials"
            label: "Redes sociais"
            widget: "object"
            fields:
              - { name: "instagram", label: "Instagram (URL)", widget: "string", required: false }
              - { name: "vimeo", label: "Vimeo (URL)", widget: "string", required: false }
              - { name: "youtube", label: "YouTube (URL)", widget: "string", required: false }
          - name: "nav"
            label: "Menu de navegação"
            widget: "list"
            fields:
              - { name: "label", label: "Texto", widget: "string" }
              - { name: "href", label: "Ficheiro (ex.: multicam.html)", widget: "string" }
          - name: "hero"
            label: "Cabeçalho da Home"
            widget: "object"
            fields:
              - { name: "title", label: "Título", widget: "string" }
              - { name: "subtitleLines", label: "Linhas do subtítulo", widget: "list", field: { name: "line", label: "Linha", widget: "string" } }
              - name: "videos"
                label: "Vídeos de fundo (troca no scroll)"
                widget: "list"
                fields:
                  - { name: "src", label: "Vídeo", widget: "file" }
                  - { name: "poster", label: "Imagem de capa", widget: "image", required: false }
          - name: "homeStack"
            label: "Blocos abaixo do cabeçalho"
            widget: "list"
            fields:
              - { name: "type", label: "Tipo", widget: "select", options: ["image", "video"], default: "image" }
              - { name: "src", label: "Ficheiro", widget: "file" }
              - { name: "poster", label: "Capa (só vídeo)", widget: "image", required: false }
              - { name: "alt", label: "Descrição", widget: "string", required: false }

  # ── Galerias (Studio Space, Multicam, etc.) ──
  - name: "galleries"
    label: "Galerias"
    files:
      - name: "studio-space"
        label: "Studio Space"
        file: "content/galleries/studio-space.json"
        fields: &gallery_fields
          - { name: "title", label: "Título da página", widget: "string" }
          - { name: "note", label: "Aviso opcional (ex.: 'em breve')", widget: "string", required: false }
          - name: "items"
            label: "Mídias"
            widget: "list"
            summary: "{{fields.alt}} ({{fields.type}})"
            fields:
              - { name: "type", label: "Tipo", widget: "select", options: ["image", "video"], default: "image" }
              - { name: "featured", label: "Destaque (largura total)", widget: "boolean", default: false }
              - { name: "src", label: "Ficheiro", widget: "file" }
              - { name: "poster", label: "Capa (só vídeo)", widget: "image", required: false }
              - { name: "alt", label: "Descrição", widget: "string", required: false }
      - name: "multicam"
        label: "Multicam"
        file: "content/galleries/multicam.json"
        fields: *gallery_fields
      - name: "aftermovie"
        label: "Aftermovie"
        file: "content/galleries/aftermovie.json"
        fields: *gallery_fields
      - name: "photography"
        label: "Photography"
        file: "content/galleries/photography.json"
        fields: *gallery_fields
      - name: "fpv-drone"
        label: "FPV/Drone"
        file: "content/galleries/fpv-drone.json"
        fields: *gallery_fields
      - name: "social-media"
        label: "Social Media"
        file: "content/galleries/social-media.json"
        fields: *gallery_fields

  # ── Equipa ──
  - name: "team"
    label: "Equipa"
    files:
      - name: "team"
        label: "Meet the Team"
        file: "content/team.json"
        fields:
          - { name: "title", label: "Título da página", widget: "string" }
          - name: "featured"
            label: "Destaques (topo)"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "roles", label: "Funções", widget: "string" }
              - { name: "photo", label: "Foto", widget: "image", required: false }
          - name: "members"
            label: "Membros"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "roles", label: "Funções (texto)", widget: "string" }
              - name: "skills"
                label: "Filtros a que pertence"
                widget: "select"
                multiple: true
                options: ["photography", "videographer", "drone", "fpv", "editor", "social-media"]
              - { name: "photo", label: "Foto", widget: "image", required: false }

  # ── Parceiros ──
  - name: "partners"
    label: "Parceiros"
    files:
      - name: "partners"
        label: "Parceiros"
        file: "content/partners.json"
        fields:
          - { name: "title", label: "Título da página", widget: "string" }
          - name: "main"
            label: "Principais"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "logo", label: "Logótipo", widget: "image", required: false }
          - name: "secondary"
            label: "Secundários"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Nome", widget: "string" }
              - { name: "logo", label: "Logótipo", widget: "image", required: false }
